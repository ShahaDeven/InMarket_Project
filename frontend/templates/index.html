<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>InMarket — Consumer Intelligence</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="app">
    <header class="app__header">
      <div class="brand">
        <span class="brand__mark">◴</span>
        <div class="brand__text">
          <h1 class="brand__title">InMarket</h1>
          <p class="brand__sub">Consumer &amp; economic intelligence · Live FRED Data</p>
        </div>
      </div>
      <span class="status" id="status"><i></i> ready</span>
    </header>

    <main class="chat" id="chat">
      <div class="msg msg--bot">
        <div class="msg__avatar">IM</div>
        <div class="msg__body">
          <div class="msg__content">
            <p>Ask about the U.S. economy and consumer trends, I pull live data
               from <strong>FRED</strong> and cite the series I use.</p>
          </div>
          <div class="examples">
            <button class="chip" data-q="What's the current U.S. unemployment rate?">Unemployment rate now</button>
            <button class="chip" data-q="How has consumer sentiment changed over the past year?">Consumer sentiment trend</button>
            <button class="chip" data-q="How's the labor market doing?">Labor market snapshot</button>
            <button class="chip" data-q="Compare unemployment and inflation since 2020.">Unemployment vs. inflation</button>
          </div>
        </div>
      </div>
    </main>

    <form class="composer" id="composer">
      <textarea id="input" class="composer__input" rows="1"
                placeholder="Ask about inflation, jobs, housing, spending…"
                autocomplete="off"></textarea>
      <button type="submit" class="composer__send" id="send" aria-label="Send">
        <span>Send</span>
      </button>
    </form>
  </div>

  <template id="tpl-user">
    <div class="msg msg--user">
      <div class="msg__body"><div class="msg__content"></div></div>
    </div>
  </template>

  <template id="tpl-bot">
    <div class="msg msg--bot">
      <div class="msg__avatar">IM</div>
      <div class="msg__body">
        <div class="msg__content"></div>
        <div class="tools"></div>
      </div>
    </div>
  </template>

  <script src="{{ url_for('static', filename='chat.js') }}"></script>
</body>
</html>
